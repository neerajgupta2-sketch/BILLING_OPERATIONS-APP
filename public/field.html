<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Field Staff — Billing Operations</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="topbar">
  <div class="brand"><span class="bolt">⚡</span> Billing Ops <span class="sub">Field</span></div>
  <div class="topbar-right">
    <span class="switch-link" onclick="location.href='/'">Switch role</span>
  </div>
</div>

<div class="container-narrow">

  <!-- Step 1: pick your name -->
  <div id="pickNameView" class="card">
    <h3 style="margin-bottom:10px;">Who are you?</h3>
    <div class="field">
      <label>Select your name</label>
      <select id="staffSelect"></select>
    </div>
    <button class="btn btn-primary" onclick="selectStaff()">Continue</button>
  </div>

  <!-- Step 2: case list -->
  <div id="caseListView" style="display:none;">
    <div class="card" style="margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;">
      <div>
        <div style="font-size:12px;color:var(--text-muted);">Logged in as</div>
        <div style="font-family:var(--font-display);font-weight:600;" id="staffNameLabel"></div>
      </div>
      <button class="btn btn-sm" onclick="backToNameSelect()">Change</button>
    </div>
    <div class="tabs">
      <div class="tab active" data-ftab="unbilled">Unbilled Cases</div>
      <div class="tab" data-ftab="defective">Defective Bills</div>
    </div>
    <div id="unbilledList"></div>
    <div id="defectiveList" style="display:none;"></div>
  </div>

  <!-- Step 3: ATR form (unbilled cases only) -->
  <div id="atrFormView" style="display:none;">
    <div class="card" style="margin-bottom:14px;">
      <button class="btn btn-sm" onclick="backToList()">← Back to case list</button>
    </div>
    <div class="card" id="caseDetailCard"></div>
    <div class="card">
      <h3 style="margin-bottom:14px;">Submit Action Taken Report</h3>
      <div class="field">
        <label>Meter Status</label>
        <select id="meterStatus" onchange="toggleMeterFields()">
          <option value="Working">Working</option>
          <option value="Not Working">Not Working</option>
        </select>
      </div>
      <div id="workingFields">
        <div class="field-row">
          <div class="field"><label>Reading kWh</label><input type="number" id="readingKwh" step="0.01"></div>
          <div class="field"><label>Reading kVAh</label><input type="number" id="readingKvah" step="0.01"></div>
          <div class="field"><label>Reading MD</label><input type="number" id="readingMd" step="0.01"></div>
        </div>
      </div>
      <div id="notWorkingFields" style="display:none;">
        <div class="field">
          <label>Reason</label>
          <select id="notWorkingReason">
            <option>Meter Defective</option>
            <option>Reading Back</option>
            <option>Meter Jump</option>
            <option>No Display</option>
            <option>Other</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label>Site Status</label>
        <select id="siteStatus">
          <option value="">— Select if applicable —</option>
          <option>TDC (Temporary Disconnection)</option>
          <option>PDC (Permanent Disconnection)</option>
          <option>Not Traceable</option>
          <option>No Meter No Line</option>
          <option>Duplicate Connection</option>
          <option>Other</option>
        </select>
      </div>
      <div class="field">
        <label>Remarks</label>
        <textarea id="remarks" placeholder="Any additional notes..."></textarea>
      </div>
      <button class="btn btn-primary" onclick="submitAtr()">Submit ATR</button>
    </div>
  </div>

</div>

<script src="/js/common.js"></script>
<script src="/js/field.js"></script>
</body>
</html>
